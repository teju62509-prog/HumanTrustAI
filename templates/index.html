<!DOCTYPE html>
<html>
<head>
    <title>HumanTrust AI</title>

    <style>

        body{
            background-image: url("https://images.unsplash.com/photo-1518770660439-4636190af475");
            background-size: cover;
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
        }

        .container{
            background: rgba(0,0,0,0.6);
            padding: 40px;
            margin-top: 100px;
            width: 400px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
        }

        input{
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }

        button{
            background-color: #00c3ff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: #0099cc;
        }

    </style>

</head>

<body>

<div class="container">

<h2>HumanTrust AI</h2>

<form method="post">
{% csrf_token %}

<input type="text" name="link" placeholder="Enter Profile Link">

<br>

<input type="number" name="followers" placeholder="Enter Followers Count">

<br>

<button type="submit">Check Trust Score</button>

</form>

{% if score %}

<h3>Trust Score: {{score}}</h3>
<h3>Result: {{result}}</h3>

{% endif %}

</div>

</body>
</html>
